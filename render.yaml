services:
  - type: web
    name: vlad-bingo-web
    env: python
    buildCommand: "./backend/build.sh"
    # We added -b 0.0.0.0 and -p $PORT here
    startCommand: "cd backend && python -m daphne -b 0.0.0.0 -p $PORT vlad_bingo.asgi:application"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: vlad-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: vlad_db
          property: connectionString

  - type: worker
    name: vlad-bingo-bot
    env: python
    startCommand: "cd backend && python bingo/bot/main.py"

  - type: redis
    name: vlad-redis
    plan: free
    ipAllowList: []

databases:
  - name: vlad_db
    plan: free
    ipAllowList: []
