<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VLAD BINGO PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow: hidden; }
        .header-bg { background: #0b0f19; border-bottom: 2px solid #3b82f6; }
        .room-card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .room-card.live { border-left-color: #ef4444; opacity: 0.8; }
        .active-banner { background: #0b0f19; border: 2px solid #ef4444; color: #ef4444; border-radius: 8px; padding: 6px; text-align: center; font-weight: 900; margin-bottom: 10px; animation: pulse 2s infinite; }
        .card-num { height: 32px; background: #1e293b; border: 1px solid #3b82f6; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: #93c5fd; }
        .card-num.active { background: #3b82f6 !important; color: white; border-color: white; transform: scale(1.1); box-shadow: 0 0 10px #3b82f6; }
        .preview-container { border: 2px solid #3b82f6; border-radius: 12px; padding: 10px; background: rgba(0,0,0,0.4); width: 135px; }
        .mini-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border: 0.1px solid #1e3a8a; color: #93c5fd;}
        
        .tracker-row { display: grid; grid-template-columns: 15px repeat(15, 1fr); gap: 2px; margin-bottom: 4px; align-items: center;}
        .tracker-letter { font-weight: 900; font-size: 12px; color: #60a5fa; text-align: center; }
        .tracker-dot { font-size: 7px; font-weight: bold; text-align: center; padding: 4px 0; border-radius: 3px; background-color: #1e293b; color: #64748b; transition: 0.2s;}
        .tracker-dot.called { background-color: #ef4444 !important; color: white !important; transform: scale(1.15); box-shadow: 0 0 5px #ef4444;}
        
        .btn-start { background: linear-gradient(135deg, #ef4444, #dc2626); border-radius: 12px; padding: 15px; font-weight: 900; font-size: 1.1rem; width: 100%; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); color: white; }
        .btn-start:active { transform: scale(0.95); }
        .btn-random { background: #1e293b; border: 1px solid #3b82f6; border-radius: 12px; width: 100%; padding: 10px; font-size: 0.8rem; font-weight: bold; color: #3b82f6; margin-bottom: 8px; }
        .btn-deposit { background: #3b82f6; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 10px; }
        
        .modal { background: rgba(0,0,0,0.95); position: fixed; inset: 0; z-index: 100; padding: 20px; display: none; flex-direction: column;}
        .history-row { background: #1e293b; margin-bottom: 4px; padding: 10px; border-radius: 6px; font-size: 10px; display: flex; justify-content: space-between; }
        .tab-btn { flex: 1; text-align: center; padding: 10px; font-weight: bold; border-bottom: 2px solid transparent; color: gray; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; }
        
        /* The Celebration Modal */
        .celebration { background: #3b82f6; border-radius: 24px; padding: 24px; text-align: center; max-width: 320px; width: 100%; border: 4px solid #93c5fd; box-shadow: 0 0 50px rgba(59, 130, 246, 0.8); }
        .win-grid-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; border-radius: 4px; border: 1px solid #e2e8f0; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="antialiased select-none">
    
    <!-- HEADER -->
    <div class="header-bg p-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2"><div class="bg-blue-600 p-1 rounded font-black text-[10px] text-white italic">VLAD</div><div class="font-black text-xs uppercase text-white">BINGO PRO</div></div>
        <div class="flex items-center gap-2"><div class="bg-slate-800 px-3 py-1 rounded-full flex items-center gap-2"><span class="text-yellow-400">👛</span><span id="bal-header" class="font-bold text-xs">0.00</span></div><button onclick="handleDeposit()" class="btn-deposit">+ DEPOSIT</button></div>
    </div>
    
    <div class="bg-slate-900/80 p-2 flex justify-around items-center text-[9px] font-bold text-blue-400 uppercase border-b border-blue-900/50">
        <div>🎲 Room: <span id="nav-room" class="text-white">10</span></div>
        <div>🎁 Win: <span id="nav-prize" class="text-white text-[11px]">0</span></div>
        <div onclick="openHistory()">📜 History</div>
        <div onclick="location.reload()">🔄 Refresh</div>
    </div>
    
    <div id="timer-bar" class="bg-black/60 p-1 text-center border-b border-white/5">
        <span class="text-[10px] text-blue-400 font-bold uppercase">Lobby Closes: </span>
        <span id="timer" class="text-[10px] font-mono font-black text-white ml-1">00:00</span>
    </div>
    
    <!-- LOBBY -->
    <div id="v-lobby" class="p-4 h-screen overflow-y-auto pb-32"><div id="room-list"></div></div>

    <!-- SELECTOR -->
    <div id="v-selector" class="hidden p-4">
        <button onclick="showLobby()" class="text-blue-400 text-[10px] font-bold mb-3 flex items-center gap-1">← BACK TO ROOMS</button>
        <div id="active-call-banner" class="active-banner hidden">Active Game Call <span id="call-count">0</span>/75</div>
        <!-- CHANGED ID TO grid-500 -->
        <div id="grid-500" class="grid grid-cols-10 gap-1 h-64 overflow-y-auto mb-6 p-2 bg-black/30 rounded-xl"></div>
        <div id="spectator-tracker" class="hidden mb-6 p-2 bg-slate-900/80 rounded-xl border border-blue-900/50"></div>
        <div class="flex gap-4 items-end bg-slate-800/50 p-3 rounded-2xl border border-white/5">
            <div class="preview-container"><div id="mini-grid" class="grid grid-cols-5 gap-0.5"></div><div class="text-[9px] text-center mt-2 text-blue-400 font-bold uppercase">Card <span id="prev-num">#---</span></div></div>
            <div class="flex-1">
                <button onclick="pickRandom()" class="btn-random">🎲 RANDOM</button>
                <button id="join-btn" onclick="joinGame()" class="btn-start">▶ START!</button>
            </div>
        </div>
    </div>

    <!-- LIVE PLAY HALL (INTERACTIVE) -->
    <div id="v-play" class="hidden p-4 h-screen overflow-y-auto pb-32">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-blue-400 font-bold text-xs uppercase tracking-widest">My Board</h2>
            <div id="play-status-badge" class="text-[10px] bg-blue-500/20 border border-blue-500 text-blue-500 px-3 py-1 rounded-full font-black">WAITING...</div>
        </div>
        <div id="play-tracker" class="mb-6 p-2 bg-slate-900/80 rounded-xl border border-blue-900/50"></div>

        <div class="flex justify-center mb-6">
            <div class="bg-slate-800 p-2 rounded-2xl border-2 border-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                <div class="grid grid-cols-5 gap-1 mb-1 text-center"><div class="font-black text-xl text-blue-400">B</div><div class="font-black text-xl text-blue-400">I</div><div class="font-black text-xl text-blue-400">N</div><div class="font-black text-xl text-blue-400">G</div><div class="font-black text-xl text-blue-400">O</div></div>
                <!-- THE INTERACTIVE GRID -->
                <div id="play-card" class="grid grid-cols-5 gap-1"></div>
            </div>
        </div>
        <button onclick="hitBingo()" class="w-full py-5 bg-gradient-to-r from-red-500 to-red-700 rounded-2xl font-black text-2xl shadow-[0_0_20px_rgba(239,68,68,0.4)] text-white active:scale-95 transition-all tracking-widest">📢 BINGO!</button>
    </div>

    <!-- WIN CELEBRATION MODAL -->
    <div id="m-win" class="modal" style="justify-content:center; align-items:center;">
        <div class="celebration">
            <div class="text-6xl mb-2">🏆</div>
            <div class="text-3xl mb-2">🎉 <span class="font-black text-white tracking-widest">BINGO!</span> 🎉</div>
            <p class="text-blue-100 mb-4 text-xs font-bold">You got a Bingo with card <span id="win-card-num" class="text-white text-lg"></span>!</p>
            <div class="bg-white rounded-xl p-2 mb-6 shadow-inner">
                <div class="grid grid-cols-5 gap-1 text-center mb-1">
                    <div class="font-black text-blue-600 text-sm">B</div><div class="font-black text-blue-600 text-sm">I</div><div class="font-black text-blue-600 text-sm">N</div><div class="font-black text-blue-600 text-sm">G</div><div class="font-black text-blue-600 text-sm">O</div>
                </div>
                <div id="win-card-grid" class="grid grid-cols-5 gap-1"></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-yellow-400 text-black font-black text-xl py-3 rounded-xl shadow-lg active:scale-95 transition-all">Keep Playing!</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="m-history" class="modal">
        <div class="flex justify-between items-center mb-2"><h2 class="text-blue-400 font-black italic uppercase text-lg">History</h2><button onclick="closeHistory()" class="text-2xl text-gray-400">✕</button></div>
        <div class="flex mb-4"><div id="tab-bets" onclick="switchTab('bets')" class="tab-btn active">My Bets</div><div id="tab-win" onclick="switchTab('win')" class="tab-btn">All Winners</div></div>
        <div id="history-content" class="h-full overflow-y-auto pb-20"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; const uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;
        let activeBet = 10; let myCard = null; let historyData = {winners: [], my_bets: []};
        let currentRoomTime = 0; let currentRoomStatus = 'LOBBY'; let myActiveGameId = null;

        function handleDeposit() { tg.showAlert("Redirecting to secure Payment Gateway..."); }
        function appLoop() { if (myActiveGameId) { updatePlayHall(); } else { refreshLobby(); } }

        function buildTracker(containerId) {
            const container = document.getElementById(containerId);
            if (container.children.length > 0) return;
            const rows = { 'B': [1,15], 'I': [16,30], 'N': [31,45], 'G': [46,60], 'O': [61,75] };
            for(const [letter, bounds] of Object.entries(rows)) {
                let rowDiv = document.createElement('div'); rowDiv.className = "tracker-row";
                let lDiv = document.createElement('div'); lDiv.className = "tracker-letter"; lDiv.innerText = letter; rowDiv.appendChild(lDiv);
                for(let i=bounds[0]; i<=bounds[1]; i++) {
                    let dot = document.createElement('div'); dot.id = containerId + '-dot-' + i;
                    dot.className = "tracker-dot"; dot.innerText = i; rowDiv.appendChild(dot);
                }
                container.appendChild(rowDiv);
            }
        }

        function refreshLobby() {
            fetch('/api/lobby-info/'+uid+'/').then(r=>r.json()).then(d => {
                document.getElementById('bal-header').innerText = d.balance.toFixed(2);
                if(d.active_game_id) {
                    myActiveGameId = d.active_game_id;
                    document.getElementById('v-lobby').classList.add('hidden'); document.getElementById('v-selector').classList.add('hidden'); document.getElementById('timer-bar').classList.add('hidden'); document.getElementById('v-play').classList.remove('hidden');
                    updatePlayHall(); return;
                }
                const list = document.getElementById('room-list'); list.innerHTML = '';
                d.rooms.sort((a,b) => a.bet - b.bet);
                d.rooms.forEach(room => {
                    const isLive = room.status === 'ACTIVE';
                    list.innerHTML += `
                        <div onclick="selectRoom(${room.bet})" class="room-card ${isLive ? 'live' : ''} cursor-pointer">
                            <div class="flex justify-between w-full">
                                <div>
                                    <div class="text-white font-black text-xl">Bingo ${room.bet}</div>
                                    <div class="text-[11px] font-bold ${isLive ? 'text-red-400' : 'text-blue-400'} mt-1">
                                        ${isLive ? 'LIVE: CALLING ' + room.called_count + '/75' : 'STARTING IN: ' + room.time_left + 's'}
                                    </div>
                                    <div class="text-[10px] text-gray-400 mt-1">Win: <span class="text-white font-bold">${room.win.toFixed(0)} ETB</span></div>
                                </div>
                                <div class="flex flex-col items-end justify-center">
                                    <div class="${isLive ? 'text-red-500' : 'text-blue-500'} font-bold text-2xl">${isLive ? '⏳' : '▶'}</div>
                                    <div class="text-[9px] text-gray-500 mt-2">${room.players} Players</div>
                                </div>
                            </div>
                        </div>`;
                    if(activeBet == room.bet) {
                        currentRoomTime = room.time_left; currentRoomStatus = room.status;
                        document.getElementById('nav-prize').innerText = room.win.toFixed(0);
                        updateBanner(room.status, room.called_count, room.called_numbers);
                    }
                });
            });
        }

        function updatePlayHall() {
            if(!myActiveGameId) return;
            buildTracker('play-tracker');
            fetch(`/api/game-info/${myActiveGameId}/${uid}/`).then(r=>r.json()).then(d => {
                if(d.status === 'ENDED') { tg.showAlert("Game Over! Check History."); location.reload(); return; }
                document.getElementById('nav-prize').innerText = d.prize.toFixed(0);
                const badge = document.getElementById('play-status-badge');
                if(d.status === 'ACTIVE') { badge.innerText = "LIVE: " + d.called.length + "/75"; badge.className = "text-[10px] bg-red-500/20 border border-red-500 text-red-500 px-3 py-1 rounded-full font-black animate-pulse"; }
                
                d.called.forEach(num => { const dot = document.getElementById('play-tracker-dot-'+num); if(dot) dot.classList.add('called'); });

                const pc = document.getElementById('play-card');
                if(pc.children.length === 0) {
                    d.board.forEach(row => row.forEach(val => {
                        let cell = document.createElement('div'); 
                        cell.className = 'w-[11vw] h-[11vw] max-w-[50px] max-h-[50px] flex items-center justify-center text-lg font-black rounded-lg border border-blue-900/50 bg-slate-900 shadow-inner cursor-pointer transition-colors';
                        if (val === 'FREE') { 
                            cell.innerText = '⭐'; 
                            cell.classList.add('bg-blue-600', 'text-yellow-400', 'is-marked'); 
                        } else {
                            cell.innerText = val;
                            cell.classList.add('text-blue-200');
                            cell.onclick = function() {
                                this.classList.toggle('bg-red-500');
                                this.classList.toggle('text-white');
                                this.classList.toggle('border-red-400');
                                this.classList.toggle('text-blue-200');
                                this.classList.toggle('is-marked');
                            };
                        }
                        pc.appendChild(cell);
                    }));
                }
            });
        }

        function hitBingo() {
            let marked = [];
            document.querySelectorAll('#play-card .is-marked').forEach(el => {
                if(el.innerText !== '⭐') marked.push(el.innerText);
            });
            if(marked.length === 0) return tg.showAlert("⚠️ HOLD ON!\n\nYou haven't marked any numbers yet!");
            
            fetch(`/api/check-win/${myActiveGameId}/${uid}/?marked=${marked.join(',')}`).then(r=>r.json()).then(d => {
                if (d.status === 'WINNER') {
                    document.getElementById('m-win').style.display = 'flex';
                    document.getElementById('win-card-num').innerText = myCard;
                    const grid = document.getElementById('win-card-grid'); grid.innerHTML = '';
                    document.querySelectorAll('#play-card > div').forEach(cell => {
                        let clone = cell.cloneNode(true); clone.className = 'win-grid-cell';
                        if (clone.classList.contains('is-marked')) { clone.classList.add('bg-red-500', 'text-white', 'border-red-600'); } 
                        else { clone.classList.add('bg-white', 'text-gray-800', 'border-gray-200'); }
                        if (clone.innerText === '⭐') { clone.classList.remove('bg-red-500', 'bg-white', 'text-gray-800'); clone.classList.add('bg-blue-100', 'text-yellow-500'); }
                        grid.appendChild(clone);
                    });
                } 
                else if (d.status === 'NOT_YET') { tg.showAlert("❌ NOT BINGO YET!\n\nYou missed a number or lack enough lines! Keep matching."); } 
                else { tg.showAlert("⏳ Waiting for the dealer to draw more numbers."); }
            });
        }

        function updateBanner(status, count, called_numbers) {
            const b = document.getElementById('active-call-banner'); const btn = document.getElementById('join-btn');
            const gGrid = document.getElementById('grid-500'); const sTrack = document.getElementById('spectator-tracker');
            if(status === 'ACTIVE') { 
                b.classList.remove('hidden'); document.getElementById('call-count').innerText=count; btn.disabled=true; btn.style.opacity="0.3"; btn.innerText="WAITING...";
                gGrid.classList.add('hidden'); sTrack.classList.remove('hidden'); buildTracker('spectator-tracker');
                document.querySelectorAll('#spectator-tracker .tracker-dot').forEach(el=>el.classList.remove('called'));
                if(called_numbers) called_numbers.forEach(n => { let dot = document.getElementById('spectator-tracker-dot-'+n); if(dot) dot.classList.add('called'); });
            } else { 
                b.classList.add('hidden'); btn.disabled=false; btn.style.opacity="1"; btn.innerText="▶ START!";
                gGrid.classList.remove('hidden'); sTrack.classList.add('hidden');
            }
        }
        
        setInterval(() => { if(!myActiveGameId) { const tEl = document.getElementById('timer'); if(currentRoomStatus === 'ACTIVE') { tEl.innerText = "PLAYING..."; tEl.classList.add('text-red-400'); } else { tEl.classList.remove('text-red-400'); if(currentRoomTime > 0) currentRoomTime--; let m = Math.floor(currentRoomTime / 60), s = currentRoomTime % 60; tEl.innerText = m + ":" + (s < 10 ? "0" + s : s); } } }, 1000);
        function showLobby() { document.getElementById('v-selector').classList.add('hidden'); document.getElementById('v-lobby').classList.remove('hidden'); }
        function selectRoom(t) { activeBet=t; document.getElementById('nav-room').innerText=t; document.getElementById('v-lobby').classList.add('hidden'); document.getElementById('v-selector').classList.remove('hidden'); initGrid(); appLoop(); }
        // CHANGED LOOP LIMIT TO 500
        function initGrid() { const g = document.getElementById('grid-500'); g.innerHTML = ''; for(let i=1; i<=500; i++) { let b = document.createElement('button'); b.className="card-num"; b.id="c-"+i; b.innerText=i; b.onclick=()=>selectCard(i); g.appendChild(b); } }
        function selectCard(n) { myCard=n; document.querySelectorAll('.card-num').forEach(el=>el.classList.remove('active')); document.getElementById('c-'+n).classList.add('active'); document.getElementById('prev-num').innerText="#"+n; fetch('/api/card-data/'+n+'/').then(r=>r.json()).then(d=>{ const mini = document.getElementById('mini-grid'); mini.innerHTML = ''; d.board.forEach(row=>row.forEach(v=>{ let c=document.createElement('div'); c.className='mini-cell'; c.innerText=v==='FREE'?'X':v; mini.appendChild(c); })); }); document.getElementById('c-'+n).scrollIntoView({behavior:'smooth', block:'center'}); }
        // CHANGED MATH.RANDOM LIMIT TO 500
        function pickRandom() { const r=Math.floor(Math.random()*500)+1; selectCard(r); }
        function joinGame() { fetch(`/api/join-room/${uid}/${activeBet}/${myCard}/`).then(r=>r.json()).then(d=>{ if(d.status==='ok') location.reload(); else tg.showAlert(d.error); }); }
        function openHistory() { document.getElementById('m-history').style.display = 'flex'; fetch('/api/history/'+uid+'/').then(r=>r.json()).then(d => { historyData = d; switchTab('bets'); }); }
        function closeHistory() { document.getElementById('m-history').style.display = 'none'; }
        function switchTab(tab) { document.getElementById('tab-bets').className = "tab-btn " + (tab==='bets' ? 'active' : ''); document.getElementById('tab-win').className = "tab-btn " + (tab==='win' ? 'active' : ''); const content = document.getElementById('history-content'); content.innerHTML = ''; if(tab === 'bets') { if(historyData.my_bets.length===0) content.innerHTML="<div class='text-center text-gray-500 mt-10'>No bets yet.</div>"; historyData.my_bets.forEach(h => { content.innerHTML += `<div class="history-row border-l-2 ${h.status==='WON' ? 'border-green-500' : 'border-red-500'}"><div><div class="text-gray-400">Game</div><div class="font-bold">#${h.game_id}</div></div><div><div class="text-gray-400">Bet/Card</div><div class="text-blue-400">${h.bet}/#${h.card}</div></div><div class="text-right"><div class="text-gray-400">Result</div><div class="font-black ${h.status==='WON' ? 'text-green-500' : 'text-red-500'}">${h.status==='WON' ? '+'+h.prize : '-'+h.bet}</div></div></div>`; }); } else { historyData.winners.forEach(h => { content.innerHTML += `<div class="history-row"><div><div class="text-gray-400">Game</div><div class="font-bold">#${h.game_id}</div></div><div><div class="text-gray-400">Winner</div><div class="text-blue-400">@${h.winner}</div></div><div class="text-right"><div class="text-gray-400">Prize</div><div class="text-green-400 font-black">${h.prize} ETB</div></div></div>`; }); } }
        
        appLoop(); setInterval(appLoop, 2000);
    </script>
</body>
</html>
